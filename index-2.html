
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Calendar Parser</title>
    <!-- We use ICAL.js to parse the raw calendar data -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 40px; background-color: #f9f9f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background: #1765cc; }
        #event-list { margin-top: 20px; }
        .event-item { padding: 15px; border-bottom: 1px solid #eee; }
        .event-item:last-child { border-bottom: none; }
        .event-date { color: #d93025; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }
        .event-title { display: block; font-size: 1.1rem; margin-top: 4px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Calendar Chronology</h2>
    <p style="font-size: 0.9rem; color: #666;">Paste your Public iCal URL (ends in .ics):</p>
    <input type="text" id="calUrl" placeholder="https://calendar.google.com/calendar/ical/g4unrs%40gmail.com/public/basic.ics">
    <button onclick="fetchAndParse()">List Events</button>

    <div id="event-list"></div>
</div>

<script>
    async function fetchAndParse() {
        const url = document.getElementById('calUrl').value;
        const listContainer = document.getElementById('event-list');
        listContainer.innerHTML = "Loading...";

        try {
            // Note: Public fetches may require a CORS proxy if running locally
            const proxy = "https://corsproxy.io/?"; 
            const response = await fetch(proxy + encodeURIComponent(url));
            const data = await response.text();
            
            const jcalData = ICAL.parse(data);
            const comp = new ICAL.Component(jcalData);
            const vevents = comp.getAllSubcomponents('vevent');

            // Map and sort events by start date
            const events = vevents.map(vevent => {
                const event = new ICAL.Event(vevent);
                return {
                    title: event.summary,
                    start: event.startDate.toJSDate(),
                    description: event.description
                };
            }).sort((a, b) => a.start - b.start);

            displayEvents(events);
        } catch (error) {
            listContainer.innerHTML = "<p style='color:red'>Error: Could not fetch calendar. Ensure the URL is a public .ics link.</p>";
            console.error(error);
        }
    }

    function displayEvents(events) {
        const listContainer = document.getElementById('event-list');
        if (events.length === 0) {
            listContainer.innerHTML = "No upcoming events found.";
            return;
        }

        listContainer.innerHTML = events.map(ev => `
            <div class="event-item">
                <div class="event-date">${ev.start.toLocaleString([], {weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit'})}</div>
                <span class="event-title">${ev.title}</span>
            </div>
        `).join('');
    }
</script>

</body>
</html>
